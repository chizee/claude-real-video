<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { width:1920px; height:1080px; background:#0d0b07; color:#e8dfcf;
         font-family:Menlo,Consolas,monospace; display:flex; align-items:center; justify-content:center }
  .wrap { max-width:1500px; padding:0 80px }
  .dim { color:#8a7a5f; font-size:34px; margin-bottom:36px }
  h1 { font-size:56px; line-height:1.35; font-weight:700; color:#e8dfcf }
  h1 .amber { color:#f0b429 }
  .sub { margin-top:44px; font-size:44px; color:#f0b429; font-weight:700 }
  .bar { width:88px; height:6px; background:#f0b429; margin-bottom:40px; border-radius:3px }
</style></head><body>
<div class="wrap">
  <div class="bar"></div>
  <div class="dim">$ your-llm watch video.mp4</div>
  <h1>Your LLM isn't watching that video —<br>it's just reading the subtitles.</h1>
  <div class="sub">crv makes it actually watch.</div>
</div>
</body></html>
